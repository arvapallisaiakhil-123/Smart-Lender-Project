```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Lender | Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#2563eb,#0f172a);

padding:30px;

}

.register-card{

width:480px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(18px);

padding:40px;

border-radius:20px;

box-shadow:0 20px 50px rgba(0,0,0,.35);

color:white;

}

.logo{

width:90px;

height:90px;

margin:auto;

background:white;

color:#2563eb;

display:flex;

justify-content:center;

align-items:center;

border-radius:50%;

font-size:40px;

margin-bottom:20px;

}

h2{

text-align:center;

font-weight:700;

margin-bottom:5px;

}

.subtitle{

text-align:center;

opacity:.8;

margin-bottom:25px;

}

.form-control{

height:50px;

border-radius:12px;

}

.btn-register{

height:50px;

font-size:18px;

font-weight:600;

border:none;

border-radius:12px;

background:#2563eb;

}

.btn-register:hover{

background:#1d4ed8;

}

.login-link{

text-align:center;

margin-top:20px;

}

.login-link a{

color:white;

font-weight:600;

text-decoration:none;

}

.alert{

border-radius:12px;

}

</style>

</head>

<body>

<div class="register-card">

<div class="logo">

<i class="fa-solid fa-building-columns"></i>

</div>

<h2>Create Account</h2>

<p class="subtitle">

Join Smart Lender Banking Portal

</p>

{% if error %}

<div class="alert alert-danger">

{{ error }}

</div>

{% endif %}

<form action="/registerUser" method="POST">

<div class="mb-3">

<label>Full Name</label>

<input
type="text"
name="fullname"
class="form-control"
placeholder="Enter Full Name"
required>

</div>

<div class="mb-3">

<label>Email Address</label>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter Email"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
id="password"
class="form-control"
placeholder="Enter Password"
required>

</div>

<div class="mb-3">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
class="form-control"
placeholder="Confirm Password"
required>

</div>

<button class="btn btn-primary btn-register w-100">

<i class="fa-solid fa-user-plus"></i>

Create Account

</button>

</form>

<div class="login-link">

Already have an account?

<a href="/login">

Login

</a>

</div>

</div>

<script>

const form=document.querySelector("form");

form.addEventListener("submit",function(e){

const p=document.getElementById("password").value;

const c=document.getElementById("confirmPassword").value;

if(p!==c){

e.preventDefault();

alert("Passwords do not match!");

}

});

</script>

</body>

</html>
```
